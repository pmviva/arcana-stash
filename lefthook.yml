###
# LEFTHOOK CONFIGURATION FILE
###

pre-commit:
    parallel: false
    commands:
        run-backend-check:
            run: |
                cd arcana-stash-api &&
                ./gradlew check &&
                cd ..
        run-backend-format:
            run: |
                cd arcana-stash-api &&
                STASH_BEFORE=$(git stash list | wc -l) &&
                git stash -q --keep-index &&
                ./gradlew spotlessApply &&
                git add . &&
                STASH_AFTER=$(git stash list | wc -l) &&
                if [ "$STASH_AFTER" -gt "$STASH_BEFORE" ]; then git stash pop -q; fi &&
                cd ..
        run-backend-test:
            run: |
                cd arcana-stash-api &&
                ./gradlew test &&
                cd ..
