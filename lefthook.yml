###
# LEFTHOOK CONFIGURATION FILE
###

pre-commit:
    parallel: false
    commands:
        run-backend-check:
            root: arcana-stash-api
            run: ./gradlew check
        run-backend-format:
            run: ./hooks/pre-commit/run-backend-format.sh
        run-backend-test:
            run: ./hooks/pre-commit/run-backend-test.sh
prepare-commit-msg:
    commands:
        run-commit-message-generate:
            interactive: true
            run: npm exec -- cz --hook
            env:
                LEFTHOOK: 0

commit-msg:
    commands:
        run-commit-message-lint:
            run: npm exec -- commitlint --color --edit {1}
