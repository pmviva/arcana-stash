###
# LEFTHOOK CONFIGURATION FILE
###

pre-commit:
    parallel: false
    commands:
        run-backend-check:
            run: |
                cd arcana-stash-api &&
                ./gradlew check &&
                cd ..
        run-backend-format:
            run: |
                cd arcana-stash-api &&
                git stash -q --keep-index &&
                ./gradlew spotlessApply &&
                git add . &&
                git stash pop -q &&
                cd ..
        run-backend-test:
            run: |
                cd arcana-stash-api &&
                ./gradlew test &&
                cd ..
