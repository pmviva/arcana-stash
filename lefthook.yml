###
# LEFTHOOK CONFIGURATION FILE
###

pre-commit:
    parallel: false
    commands:
        run-backend-check:
            source_dir: arcana-stash-api
            run: ./gradlew check
        run-backend-format:
            run: ./hooks/pre-commit/run-backend-format.sh
        run-backend-test:
            run: ./hooks/pre-commit/run-backend-test.sh
prepare-commit-msg:
    commands:
    run-commit-message-generate:
        interactive: true
        run: npm run cz --hook
        env:
            LEFTHOOK: 0

commit-msg:
    commands:
    run-commit-message-lint:
        run: npm run commitlint --edit {1}
